<header class="navbar-shell">
  <div class="navbar-left">
    <button class="topbar-icon-btn" type="button" (click)="sidebarToggled.emit()">☰</button>

    <div>
      <h1>Welcome back</h1>
      <p>Here's what's happening across your workforce today.</p>
    </div>
  </div>

  <div class="navbar-right">
    <label class="topbar-search">
      <span>⌕</span>
      <input type="text" placeholder="Search employees, reports, events..." />
    </label>

    <button class="topbar-icon-btn notification-btn" type="button">
      🔔
      <span class="notification-badge">3</span>
    </button>

    <div class="user-menu">
      <button class="user-trigger" type="button" (click)="toggleMenu()">
        <img src="https://ui-avatars.com/api/?name=HR+Admin&background=1e88e5&color=fff" alt="Admin avatar" />
        <div>
          <strong>HR Admin</strong>
          <span>Administrator</span>
        </div>
      </button>

      <div class="menu-panel" *ngIf="showMenu">
        <button type="button">Profile</button>
        <button type="button">Notifications</button>
        <button type="button" (click)="logout()">Logout</button>
      </div>
    </div>
  </div>
</header>
